# =============================================================================
# Docker Compose — FleetOps Maintenance Microservice (Local Development)
# SAD Reference: ADR-8, ADR-10
# Rule R4: Database service, backend service, healthchecks, named volumes,
#           .env file, custom network
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # SAD Reference: ADR-2 — PostgreSQL (local equivalent of Supabase)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.3-alpine3.20
    container_name: fleetops-maintenance-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maintenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintenance_secret}
      POSTGRES_DB: ${POSTGRES_DB:-maintenance_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleetops-net

  # ---------------------------------------------------------------------------
  # Database Migrations (Archetype Convention)
  # ---------------------------------------------------------------------------
  migration:
    image: migrate/migrate:v4.17.0
    container_name: fleetops-maintenance-migration
    volumes:
      - ./migrations:/migrations
    command: -path=/migrations -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fleetops-net

  # ---------------------------------------------------------------------------
  # Maintenance Microservice (Backend)
  # ---------------------------------------------------------------------------
  maintenance:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetops-maintenance-svc
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-maintenance}:${POSTGRES_PASSWORD:-maintenance_secret}@postgres:5432/${POSTGRES_DB:-maintenance_db}?sslmode=disable}
      SQS_INCIDENTS_URL: ${SQS_INCIDENTS_URL:-http://localstack:4566/000000000000/incidentes-queue}
      SQS_VEHICLES_URL: ${SQS_VEHICLES_URL:-http://localstack:4566/000000000000/vehiculos-queue}
      AWS_REGION_INCIDENTS: us-east-1
      AWS_REGION_VEHICLES: us-east-2
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
    volumes:
      - ${JWT_PUBLIC_KEY_HOST_PATH:-./secrets/jwt_public.pem}:/run/secrets/jwt_public.pem:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - fleetops-net

  # ---------------------------------------------------------------------------
  # LocalStack — Local AWS Cloud Stack (SQS)
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.4.0
    container_name: fleetops-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-setup.sh:/etc/localstack/init/ready.d/setup.sh:ro
    healthcheck:
      test: [ "CMD", "curl", "-s", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetops-net

# Named volumes for data persistence (Rule R4)
volumes:
  pgdata:
    name: fleetops-maintenance-pgdata
  localstack_data:
    name: fleetops-localstack-data

# Custom network for inter-service communication (Rule R4)
networks:
  fleetops-net:
    name: fleetops-maintenance-network
    driver: bridge
