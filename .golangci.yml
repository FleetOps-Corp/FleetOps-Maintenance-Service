version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    misspell:
      ignore-rules:
        - Correctivo
        - Preventivo
        - dependencias
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unexported-return
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
